spring.application.name=Care

spring.datasource.url=jdbc:postgresql://localhost:5432/care_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

ai.api.base-url=http://localhost:5000

security.jwt.secret=ChangeMeToALongRandomAtLeast32ByteSecretKey123!
security.jwt.expiration-ms=86400000
security.jwt.cookie-name=CARE_TOKEN
security.jwt.cookie-secure=false
